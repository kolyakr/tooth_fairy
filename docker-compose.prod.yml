# Production-oriented stack: Postgres + API (+ optional Next.js).
# Usage (from repo root):
#   docker compose -f docker-compose.prod.yml up --build
#
# Default env: `deploy/compose.env` (local smoke only). Override with a gitignored file, e.g.:
#   cp .env.production.example .env.production
# then in this file set `env_file: - .env.production` for the `api` service.
#
# Mount YOLO weights (large .pt files are gitignored by default):
#   ensure ./modeling/models/... exists on the host, or set MODELING_MODELS_HOST_PATH.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-toothfairy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-toothfairy}
      POSTGRES_DB: ${POSTGRES_DB:-toothfairy}
    volumes:
      - toothfairy_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-toothfairy} -d ${POSTGRES_DB:-toothfairy}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        INSTALL_ML: ${INSTALL_ML:-false}
    env_file:
      - deploy/compose.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # Read-only weights + pipeline utils; omit if weights are baked into a custom image.
      - ${MODELING_MODELS_HOST_PATH:-./modeling/models}:/app/modeling/models:ro

  web:
    profiles:
      - with-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  toothfairy_pg_data:
